<!DOCTYPE html>
<html ng-app="nexaERP">
<head>
  <meta charset="UTF-8">
  <title>NexaCorp ERP Portal</title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <style>
    body{margin:0;background:#0a0e1a;color:white;font-family:Arial}
    nav{background:#111827;padding:20px}
    nav a{color:#00d4ff;margin-right:20px;text-decoration:none;font-weight:bold}
    main{padding:30px}
    table{border-collapse:collapse;width:100%;margin-top:20px}
    th,td{border:1px solid #334155;padding:8px}
    th{background:#1e293b;color:#00d4ff}
    .card{background:#111827;border:1px solid #334155;padding:20px;margin:20px 0}
  </style>
</head>

<body>
  <nav>
    <a href="#!/">Overview</a>
    <a href="#!/finance">Finance</a>
    <a href="#!/sales">Sales</a>
    <a href="#!/crm">CRM</a>
    <a href="#!/production">Production</a>
    <a href="#!/supplychain">Supply Chain</a>
  </nav>

  <main>
    <div ng-view></div>
  </main>

<script>
var app = angular.module("nexaERP", ["ngRoute"]);

app.config(function($routeProvider, $locationProvider) {
  $locationProvider.hashPrefix("!");
  $routeProvider
    .when("/", {
      template: `
        <h1>NexaCorp ERP Portal</h1>
        <div class="card">
          <h2>AngularJS Progressive Web App</h2>
          <p>This project uses AngularJS routes and loads data from CSV files.</p>
          <p>Click a module above to view CSV data.</p>
        </div>
      `
    })
    .when("/finance", {template: moduleTemplate(), controller: function($scope){loadCsv($scope,"Finance","finance.csv");}})
    .when("/sales", {template: moduleTemplate(), controller: function($scope){loadCsv($scope,"Sales","sales.csv");}})
    .when("/crm", {template: moduleTemplate(), controller: function($scope){loadCsv($scope,"CRM","crm.csv");}})
    .when("/production", {template: moduleTemplate(), controller: function($scope){loadCsv($scope,"Production","production.csv");}})
    .when("/supplychain", {template: moduleTemplate(), controller: function($scope){loadCsv($scope,"Supply Chain","supplychain.csv");}})
    .otherwise({redirectTo:"/"});
});

function moduleTemplate(){
  return `
    <h1>{{title}}</h1>
    <p>Loading from: <b>assets/data/{{file}}</b></p>
    <p ng-if="loading">Loading CSV...</p>
    <p ng-if="error" style="color:#ef4444">{{error}}</p>

    <table ng-if="rows.length">
      <tr>
        <th ng-repeat="h in headers">{{h}}</th>
      </tr>
      <tr ng-repeat="row in rows">
        <td ng-repeat="h in headers">{{row[h]}}</td>
      </tr>
    </table>
  `;
}

function loadCsv($scope,title,file){
  $scope.title = title;
  $scope.file = file;
  $scope.loading = true;
  $scope.error = "";
  $scope.rows = [];
  $scope.headers = [];

  Papa.parse("assets/data/" + file, {
    download:true,
    header:true,
    complete:function(results){
      $scope.$apply(function(){
        $scope.loading = false;
        $scope.rows = results.data.filter(function(row){
          return Object.values(row).some(function(v){return v;});
        });
        $scope.headers = $scope.rows.length ? Object.keys($scope.rows[0]) : [];
        if(!$scope.rows.length){$scope.error = "CSV loaded but has no data.";}
      });
    },
    error:function(){
      $scope.$apply(function(){
        $scope.loading = false;
        $scope.error = "CSV could not load. Check file path/name.";
      });
    }
  });
}
</script>
</body>
</html>
